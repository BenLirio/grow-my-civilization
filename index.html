<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grow My Civilization</title>
  <meta property="og:title" content="Grow My Civilization">
  <meta property="og:description" content="Watch a pixel civilization rise from a campfire and meet its inevitable fate. Today's seed decides everything.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <script src="feedback.js" defer></script>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>GROW MY CIVILIZATION</h1>
      <div id="seed-display">SEED: <span id="seed-value">—</span></div>
    </div>

    <div id="stage">
      <canvas id="canvas" width="360" height="300"></canvas>
      <div id="era-label"></div>
    </div>

    <div id="stats-bar">
      <div class="stat"><span class="stat-label">POP</span><span id="stat-pop">0</span></div>
      <div class="stat"><span class="stat-label">ERA</span><span id="stat-era">—</span></div>
      <div class="stat"><span class="stat-label">FATE</span><span id="stat-fate">???</span></div>
    </div>

    <div id="loading-panel">
      <div id="loading-text">consulting the oracle of epochs...</div>
    </div>

    <div id="verdict-panel" style="display:none">
      <div id="verdict-title">CIVILIZATION VERDICT</div>
      <div id="verdict-name"></div>
      <div id="verdict-epitaph"></div>
      <div id="verdict-stats"></div>
    </div>

    <div id="share" style="display:none">
      <button onclick="share()">Share this civilization's fate</button>
    </div>
  </div>
</body>
</html>
